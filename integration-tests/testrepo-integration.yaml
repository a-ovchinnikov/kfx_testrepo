apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: testrepo-integration-test
spec:
  params:
    - name: SNAPSHOT
      type: string
      description: For simplicity, we expect a single component inside our snapshot and merge
  tasks:
    - name: test-hello-world
      params:
        - name: SNAPSHOT
          value: "$(params.SNAPSHOT)"
      taskSpec:
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: TEST_OUTPUT
            description: a description
        steps:
          - name: test-output
            image: quay.io/konflux-ci/hermeto:latest
            computeResources:
              requests:
                memory: "16Gi"
                cpu: "1"
              limits:
                memory: "16Gi"
                cpu: "1"
            env:
              - name: SNAPSHOT
                value: "$(params.SNAPSHOT)"
              - name: NAMESPACE
                value: "$(context.pipelineRun.namespace)"
              - name: LOCATOR
                valueFrom:
                  secretKeyRef:
                    name: testservicelocator00
                    key: locator
              - name: PLCONTENTS
                valueFrom:
                  secretKeyRef:
                    name: plcontents04
                    key: name
            script: |
              #!/usr/bin/bash
              echo "-Init------------------------------"
              echo "extra kick"
              dnf install -y npm
              echo "Another check"
              mkdir foo
              cd foo
              #wget https://raw.githubusercontent.com/taylormadore/express/refs/heads/testing/package-lock.json
              curl https://raw.githubusercontent.com/taylormadore/express/refs/heads/testing/package-lock.json -o package-lock.json
              curl https://raw.githubusercontent.com/taylormadore/express/refs/heads/testing/package.json -o package.json
              ls
              pwd
              echo "-Patching--------------------------"
              sed -i "s~https://registry.npmjs.org~$PLCONTENTS~g" package-lock.json
              #cat package-lock.json
              echo "-Downloading-----------------------"
              npm ci --loglevel silly
              export RES=$?
              echo "-Finished--------------------------"
              TEST_OUTPUT="foobar"
              exit $RES
