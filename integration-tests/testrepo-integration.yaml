apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: testrepo-integration-test
spec:
  params:
    - name: SNAPSHOT
      type: string
      description: For simplicity, we expect a single component inside our snapshot and merge
  tasks:
    - name: test-hello-world
      params:
        - name: SNAPSHOT
          value: "$(params.SNAPSHOT)"
      taskSpec:
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: TEST_OUTPUT
            description: a description
        steps:
          - name: test-output
            image: quay.io/konflux-ci/hermeto:latest
            computeResources:
              requests:
                memory: "3Gi"
                cpu: "1"
              limits:
                memory: "3Gi"
                cpu: "1"
            env:
              - name: SNAPSHOT
                value: "$(params.SNAPSHOT)"
              - name: NAMESPACE
                value: "$(context.pipelineRun.namespace)"
              - name: LOCATOR
                valueFrom:
                  secretKeyRef:
                    name: testservicelocator00
                    key: locator
              - name: PLCONTENTS
                valueFrom:
                  secretKeyRef:
                    name: plcontents03
                    key: name
            script: |
              #!/usr/bin/bash
              echo "-Init--------"
              dnf install -y npm
              echo "Another check"
              mkdir foo
              cd foo
              echo $PLCONTENTS > package-lock.json
              #cat package-lock.json
              echo "-Downloading-----------------------"
              npm ci
              export RES=$?
              echo "-Finished--------------------------"
              TEST_OUTPUT="foobar"
              exit $RES
